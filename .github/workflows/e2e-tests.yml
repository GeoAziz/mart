name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    strategy:
      matrix:
        test-suite:
          - smoke
          - e2e
          - integration
      fail-fast: false
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install Node dependencies
        run: npm ci
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements.txt
      
      - name: Start dev server
        run: |
          npm run dev > /tmp/next-dev.log 2>&1 &
          echo $! > /tmp/next-dev.pid
        timeout-minutes: 5
      
      - name: Wait for server
        run: |
          for i in {1..30}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 || echo "000")
            if [ "$HTTP_CODE" != "000" ]; then
              echo "✅ Server ready (HTTP $HTTP_CODE)"
              exit 0
            fi
            echo "⏳ Waiting for server... ($i/30, HTTP $HTTP_CODE)"
            sleep 2
          done
          echo "❌ Server did not become ready in time"
          echo "---- Last 200 lines of Next.js log ----"
          tail -n 200 /tmp/next-dev.log || true
          exit 1
      
      - name: Run ${{ matrix.test-suite }} tests
        run: |
          python -m pytest tests/test_master.py -m ${{ matrix.test-suite }} -v --tb=short --html=report.html --self-contained-html
        env:
          BASE_URL: http://localhost:3000
          HEADLESS: 'true'
      
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ matrix.test-suite }}
          path: report.html
      
      - name: Upload screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.test-suite }}
          path: tests/reports/screenshots/
          if-no-files-found: ignore
