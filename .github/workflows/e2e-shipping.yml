name: E2E Complete Journey Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  e2e-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

    services:
      chrome:
        image: selenium/standalone-chrome:latest
        options: >-
          --health-cmd "curl -f http://localhost:4444/wd/hub/status || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 4444:4444

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          npm install
          pip install pytest selenium webdriver-manager requests firebase-admin

      - name: Start dev server
        run: |
          npm run dev > /tmp/next-dev.log 2>&1 &
          echo $! > /tmp/next-dev.pid
        env:
          NODE_ENV: test

      - name: Wait for server
        run: |
          for i in {1..30}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 || echo "000")
            if [ "$HTTP_CODE" != "000" ]; then
              echo "✅ Server responding (HTTP $HTTP_CODE)"
              exit 0
            fi
            echo "⏳ Waiting for server... ($i/30)"
            sleep 2
          done
          echo "❌ Server did not become healthy in time"
          echo "---- Last 200 lines of Next.js log ----"
          tail -n 200 /tmp/next-dev.log || true
          exit 1

      - name: Create reports directory
        run: mkdir -p tests/reports/screenshots

      - name: Run E2E tests
        run: |
          python3 -m pytest tests/test_master.py -m e2e -v -s --tb=short
        env:
          BASE_URL: http://localhost:3000
          HEADLESS: "true"

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: tests/reports/screenshots/

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-reports
          path: tests/reports/

      - name: Notify Slack on failure
        if: failure() && env.SLACK_WEBHOOK != ''
        uses: slackapi/slack-github-action@v1
        env:
          SLACK_WEBHOOK_URL: ${{ env.SLACK_WEBHOOK }}
        with:
          payload: |
            {
              "text": "❌ E2E Test Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "E2E Complete Journey test failed on ${{ github.ref }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                  }
                }
              ]
            }

      - name: Notify Slack on success
        if: success() && env.SLACK_WEBHOOK != ''
        uses: slackapi/slack-github-action@v1
        env:
          SLACK_WEBHOOK_URL: ${{ env.SLACK_WEBHOOK }}
        with:
          payload: |
            {
              "text": "✅ E2E Test Passed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "E2E Complete Journey test passed on ${{ github.ref }} 🎉"
                  }
                }
              ]
            }
